# Hugo configuration file
title: DKU University Colloquium
baseURL: https://dku-ucc.github.io/dku-ucc-momo-site/
theme: hextra

# import hextra as module
#module:
#  imports:
#    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: about momo
      pageRef: /about
      weight: 1
    - name: momo 2025
      pageRef: /2025/
      weight: 2
    # - name: News
    #   pageRef: /news
    #   weight: 2
    - name: zephyr↗
      url: 'https://zephyrtransport.org'
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search

params:
  theme:
    default: light
    displayToggle: false

  editURL:
    enable: false
    base: 'https://github.com/ZephrTransport/momo-website/edit/main/content'

  footer:
    displayCopyright: false
    displayPoweredBy: false

  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: 'assets/images/JustMomo-trimmed.png'
      width: 150

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  outputs:
    home: ['HTML', 'JSON']
    speakers: ['HTML', 'JSON']
    section: ['HTML', 'JSON']
