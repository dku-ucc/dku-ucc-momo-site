# Hugo configuration file
title: DKU University Colloquium
baseURL: https://dku-ucc.github.io/dku-ucc-momo-site/
theme: hextra

# import hextra as module
#module:
#  imports:
#    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About UCC
      pageRef: /about
      weight: 1
    - identifier: events
      name: Events
      pageRef: /events
      weight: 2
    - name: Past Event
      pageRef: /news/
      parent: events
      weight: 3
    - name: People
      pageRef: /people
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search

params:
  theme:
    default: light
    displayToggle: false

  editURL:
    enable: false
    base: 'https://github.com/ZephrTransport/momo-website/edit/main/content'

  footer:
    displayCopyright: false
    displayPoweredBy: false

  navbar:
    displayTitle: false
    displayLogo: false
    logo:
      path: 'assets/images/JustMomo-trimmed.png'
      width: 150

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  outputs:
    home: ['HTML', 'JSON']
    speakers: ['HTML', 'JSON']
    section: ['HTML', 'JSON']
